<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protocol Flows — VoNR Learning Tool</title>
  <script src="/static/lib/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }

    /* Navigation */
    nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
    nav a { color: #8b949e; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; }
    nav a:hover { color: #c9d1d9; background: #21262d; }
    nav a.active { color: #58a6ff; background: #1f2937; }
    nav .title { color: #f0f6fc; font-size: 16px; font-weight: 600; margin-right: auto; }

    /* Layout */
    .container { display: flex; height: calc(100vh - 49px); }
    .sidebar { width: 320px; background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; padding: 16px; flex-shrink: 0; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Flow selector */
    .flow-card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
    .flow-card:hover { border-color: #58a6ff; }
    .flow-card.active { border-color: #58a6ff; background: #1f2937; }
    .flow-card h3 { font-size: 14px; color: #f0f6fc; margin-bottom: 4px; }
    .flow-card p { font-size: 12px; color: #8b949e; }
    .flow-card .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #1f6feb30; color: #58a6ff; margin-top: 4px; }

    /* Step list */
    .step-list { margin-top: 16px; }
    .step-list h4 { font-size: 13px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .step-item { display: flex; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; align-items: flex-start; }
    .step-item:hover { background: #21262d; }
    .step-item.active { background: #1f2937; border-left: 3px solid #58a6ff; }
    .step-item.completed { opacity: 0.6; }
    .step-item.future { opacity: 0.4; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; background: #30363d; color: #8b949e; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
    .step-item.active .step-num { background: #1f6feb; color: #fff; }
    .step-item.completed .step-num { background: #238636; color: #fff; }
    .step-info { flex: 1; }
    .step-label { color: #c9d1d9; font-weight: 500; }
    .step-proto { color: #8b949e; font-size: 11px; }

    /* Topology SVG */
    .topo-container { flex: 1; position: relative; }
    .topo-container svg { width: 100%; height: 100%; }

    /* Detail panel */
    .detail-panel { height: 280px; background: #161b22; border-top: 1px solid #30363d; padding: 16px 24px; overflow-y: auto; flex-shrink: 0; }
    .detail-panel h3 { font-size: 15px; color: #f0f6fc; margin-bottom: 8px; }
    .detail-panel .detail-desc { color: #8b949e; font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
    .detail-panel .detail-section { margin-bottom: 12px; }
    .detail-panel .detail-section h4 { font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-panel .detail-section ul { list-style: none; padding-left: 0; }
    .detail-panel .detail-section li { font-size: 12px; color: #c9d1d9; padding: 2px 0; }
    .detail-panel .detail-section li::before { content: "•"; color: #f85149; margin-right: 6px; }
    .detail-panel .detail-section li.metric::before { content: "📊"; margin-right: 6px; }

    /* Controls */
    .controls { display: flex; gap: 8px; padding: 8px 24px; background: #161b22; border-top: 1px solid #30363d; align-items: center; }
    .controls button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .controls button:hover { background: #30363d; }
    .controls button.primary { background: #238636; border-color: #238636; color: #fff; }
    .controls button.primary:hover { background: #2ea043; }
    .controls .spacer { flex: 1; }
    .controls .step-counter { color: #8b949e; font-size: 13px; }

    /* D3 node styling */
    .node rect { rx: 6; ry: 6; stroke-width: 2; }
    .node text { font-size: 11px; fill: #c9d1d9; text-anchor: middle; pointer-events: none; }
    .node .sublabel { font-size: 9px; fill: #8b949e; }
    .edge line { stroke-width: 1; }
    .edge.active-flow { stroke-width: 3 !important; }
    .flow-dot { fill: #58a6ff; }

    /* Tooltip */
    .tooltip { position: absolute; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 12px; pointer-events: none; z-index: 100; max-width: 250px; }
    .tooltip .tt-title { color: #f0f6fc; font-weight: 600; margin-bottom: 4px; }
    .tooltip .tt-detail { color: #8b949e; }
  </style>
</head>
<body>

<nav>
  <span class="title">VoNR Learning Tool</span>
  <a href="/">Dashboard</a>
  <a href="/flows" class="active">Protocol Flows</a>
</nav>

<div class="container">
  <!-- Sidebar: flow selector + step list -->
  <div class="sidebar">
    <div id="flow-list">
      <p style="color:#8b949e;font-size:13px;">Loading flows...</p>
    </div>
    <div class="step-list" id="step-list" style="display:none;">
      <h4>Steps</h4>
      <div id="step-items"></div>
    </div>
  </div>

  <!-- Main area: topology + detail -->
  <div class="main">
    <div class="topo-container" id="topo-container">
      <svg id="topo-svg"></svg>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <button class="primary" id="btn-play" onclick="togglePlay()">▶ Play</button>
      <button id="btn-prev" onclick="stepPrev()">◀ Prev</button>
      <button id="btn-next" onclick="stepNext()">Next ▶</button>
      <span class="spacer"></span>
      <span class="step-counter" id="step-counter">Step 0 / 0</span>
    </div>

    <div class="detail-panel" id="detail-panel">
      <h3 id="detail-title">Select a flow to begin</h3>
      <div class="detail-desc" id="detail-desc">
        Choose a protocol flow from the sidebar to visualize how messages traverse the 5G SA + IMS network step by step.
      </div>
      <div id="detail-sections"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
// =============================================================================
// State
// =============================================================================
let topoData = null;       // topology from /api/topology
let allFlows = [];         // flow list from /api/flows
let currentFlow = null;    // selected flow with steps
let currentStepIdx = -1;   // -1 = none, 0..N-1 = active step
let playing = false;
let playTimer = null;

// Layout constants
const LAYER_COLORS = {
  core: '#4f8ff7', ims: '#26c6da', ran: '#ab47bc', ue: '#4caf50',
  infrastructure: '#8b90a5', observability: '#ff9800', data: '#8b90a5',
};
const NODE_W = 72, NODE_H = 34;

// =============================================================================
// Initialization
// =============================================================================
async function init() {
  const [topoResp, flowsResp] = await Promise.all([
    fetch('/api/topology'),
    fetch('/api/flows'),
  ]);
  topoData = await topoResp.json();
  allFlows = await flowsResp.json();

  renderFlowList();
  renderTopology();
}

// =============================================================================
// Flow List (sidebar)
// =============================================================================
function renderFlowList() {
  const container = document.getElementById('flow-list');
  container.innerHTML = '';
  allFlows.forEach(f => {
    const card = document.createElement('div');
    card.className = 'flow-card';
    card.innerHTML = `
      <h3>${f.name}</h3>
      <p>${(f.description || '').substring(0, 100)}...</p>
      <span class="badge">${f.step_count} steps</span>
    `;
    card.onclick = () => selectFlow(f.id);
    container.appendChild(card);
  });
}

async function selectFlow(flowId) {
  const resp = await fetch(`/api/flows/${flowId}`);
  currentFlow = await resp.json();
  currentStepIdx = -1;
  playing = false;

  // Update sidebar
  document.querySelectorAll('.flow-card').forEach(c => c.classList.remove('active'));
  const cards = document.querySelectorAll('.flow-card');
  const idx = allFlows.findIndex(f => f.id === flowId);
  if (idx >= 0 && cards[idx]) cards[idx].classList.add('active');

  renderStepList();
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('step-list').style.display = 'block';
  updateStepCounter();
  updateDetailPanel();
  highlightFlow();
}

function renderStepList() {
  const container = document.getElementById('step-items');
  container.innerHTML = '';
  if (!currentFlow || !currentFlow.steps) return;

  currentFlow.steps.forEach((step, i) => {
    const item = document.createElement('div');
    item.className = 'step-item' + (i === currentStepIdx ? ' active' : i < currentStepIdx ? ' completed' : ' future');
    item.innerHTML = `
      <div class="step-num">${step.step_order}</div>
      <div class="step-info">
        <div class="step-label">${step.label}</div>
        <div class="step-proto">${step.protocol} / ${step.interface || '—'}</div>
      </div>
    `;
    item.onclick = () => goToStep(i);
    container.appendChild(item);
  });
}

// =============================================================================
// Playback Controls
// =============================================================================
// Callback: fired by the dot animation when the forward pass reaches destination.
// scheduleNextStep uses this to advance at exactly the right time.
let onDotArrived = null;

function togglePlay() {
  if (playing) {
    playing = false;
    clearTimeout(playTimer);
    onDotArrived = null;
    // Stop all dot animations
    d3.select('#topo-svg').selectAll('.flow-dot').interrupt();
    document.getElementById('btn-play').textContent = '▶ Play';
  } else {
    playing = true;
    document.getElementById('btn-play').textContent = '⏸ Pause';
    if (currentStepIdx < 0) currentStepIdx = 0;
    updateAll();
    scheduleNextStep();
  }
}

function scheduleNextStep() {
  if (!playing || !currentFlow) return;

  // Wait for the dot to arrive at its destination, then pause 500ms, then advance.
  onDotArrived = function() {
    onDotArrived = null;
    if (!playing) return;
    playTimer = setTimeout(() => {
      if (!playing) return;
      if (currentStepIdx < currentFlow.steps.length - 1) {
        currentStepIdx++;
        updateAll();
        scheduleNextStep();
      } else {
        playing = false;
        document.getElementById('btn-play').textContent = '▶ Play';
      }
    }, 500);
  };
}

function stepNext() {
  if (!currentFlow) return;
  if (currentStepIdx < currentFlow.steps.length - 1) {
    currentStepIdx++;
    updateAll();
  }
}

function stepPrev() {
  if (!currentFlow) return;
  if (currentStepIdx > 0) {
    currentStepIdx--;
    updateAll();
  }
}

function goToStep(idx) {
  currentStepIdx = idx;
  if (playing) togglePlay();
  updateAll();
}

function updateAll() {
  renderStepList();
  updateStepCounter();
  updateDetailPanel();
  highlightFlow();
}

function updateStepCounter() {
  const total = currentFlow ? currentFlow.steps.length : 0;
  const current = currentStepIdx >= 0 ? currentStepIdx + 1 : 0;
  document.getElementById('step-counter').textContent = `Step ${current} / ${total}`;
}

// =============================================================================
// Detail Panel
// =============================================================================
function updateDetailPanel() {
  if (!currentFlow || currentStepIdx < 0) {
    document.getElementById('detail-title').textContent = currentFlow ? currentFlow.name : 'Select a flow';
    document.getElementById('detail-desc').textContent = currentFlow ? currentFlow.description : '';
    document.getElementById('detail-sections').innerHTML = '';
    return;
  }

  const step = currentFlow.steps[currentStepIdx];
  document.getElementById('detail-title').textContent =
    `Step ${step.step_order}: ${step.label}`;
  document.getElementById('detail-desc').textContent = step.description;

  let sections = '';

  if (step.detail) {
    sections += `<div class="detail-section"><h4>How it works</h4><p style="color:#c9d1d9;font-size:12px;line-height:1.6;">${step.detail.replace(/\n/g, '<br>')}</p></div>`;
  }

  const failures = step.failure_modes || [];
  if (failures.length > 0) {
    sections += `<div class="detail-section"><h4>What can go wrong</h4><ul>${failures.map(f => `<li>${f}</li>`).join('')}</ul></div>`;
  }

  const metrics = step.metrics_to_watch || [];
  if (metrics.length > 0) {
    sections += `<div class="detail-section"><h4>Metrics to watch</h4><ul>${metrics.map(m => `<li class="metric">${m}</li>`).join('')}</ul></div>`;
  }

  document.getElementById('detail-sections').innerHTML = sections;
}

// =============================================================================
// D3.js Topology Rendering
// =============================================================================
function renderTopology() {
  if (!topoData || !topoData.nodes) return;

  const svg = d3.select('#topo-svg');
  svg.selectAll('*').remove();

  const container = document.getElementById('topo-container');
  const width = container.clientWidth;
  const height = container.clientHeight;

  svg.attr('viewBox', `0 0 ${width} ${height}`);

  // Compute node positions from grid
  const rows = 5, slots = 12;
  const nodeMap = {};

  topoData.nodes.forEach(n => {
    const x = (n.slot + 0.5) / slots * width;
    const y = (n.row + 0.5) / rows * height;
    nodeMap[n.id] = { ...n, x, y };
  });

  // Draw edges
  const edgeGroup = svg.append('g').attr('class', 'edges');
  topoData.edges.forEach(e => {
    if (e.logical) return;
    const src = nodeMap[e.source];
    const tgt = nodeMap[e.target];
    if (!src || !tgt) return;

    const color = e.active ? (LAYER_COLORS[src.layer] || '#8b90a5') : '#30363d';
    const opacity = e.active ? 0.4 : 0.15;

    edgeGroup.append('line')
      .attr('class', 'edge')
      .attr('data-source', e.source)
      .attr('data-target', e.target)
      .attr('data-protocol', e.protocol)
      .attr('x1', src.x).attr('y1', src.y)
      .attr('x2', tgt.x).attr('y2', tgt.y)
      .attr('stroke', color)
      .attr('stroke-opacity', opacity)
      .attr('stroke-dasharray', e.plane === 'data' ? '6,3' : e.plane === 'signaling' ? '3,3' : '');
  });

  // Draw nodes
  const nodeGroup = svg.append('g').attr('class', 'nodes');
  topoData.nodes.forEach(n => {
    const pos = nodeMap[n.id];
    if (!pos) return;

    const g = nodeGroup.append('g')
      .attr('class', 'node')
      .attr('data-id', n.id)
      .attr('transform', `translate(${pos.x - NODE_W/2}, ${pos.y - NODE_H/2})`);

    const borderColor = n.status === 'running'
      ? (LAYER_COLORS[n.layer] || '#8b90a5')
      : '#f85149';

    g.append('rect')
      .attr('width', NODE_W).attr('height', NODE_H)
      .attr('fill', '#21262d')
      .attr('stroke', borderColor)
      .attr('stroke-width', 1.5);

    g.append('text')
      .attr('x', NODE_W/2).attr('y', NODE_H/2 + 4)
      .text(n.label)
      .attr('fill', '#c9d1d9')
      .attr('font-size', '11px')
      .attr('text-anchor', 'middle');
  });

  // Flow animation layer (on top)
  svg.append('g').attr('class', 'flow-layer');
}

// =============================================================================
// Flow Highlighting
// =============================================================================
function highlightFlow() {
  if (!topoData || !currentFlow) return;

  const svg = d3.select('#topo-svg');
  const flowLayer = svg.select('.flow-layer');
  flowLayer.selectAll('*').remove();

  // Reset all edges and nodes to dim
  svg.selectAll('.edge').attr('stroke-opacity', 0.15).attr('stroke-width', 1);
  svg.selectAll('.node rect').attr('stroke-width', 1.5).attr('fill', '#21262d');

  if (currentStepIdx < 0) return;

  const container = document.getElementById('topo-container');
  const width = container.clientWidth;
  const height = container.clientHeight;
  const rows = 5, slots = 12;
  const halfW = NODE_W / 2, halfH = NODE_H / 2;

  // Clip a point from center to the edge of the node rectangle,
  // along the direction toward another point.
  function edgePoint(center, toward) {
    const dx = toward.x - center.x;
    const dy = toward.y - center.y;
    if (dx === 0 && dy === 0) return { x: center.x, y: center.y };
    // Find intersection with the rect boundary
    const scaleX = halfW / Math.abs(dx || 0.001);
    const scaleY = halfH / Math.abs(dy || 0.001);
    const scale = Math.min(scaleX, scaleY);
    return { x: center.x + dx * scale, y: center.y + dy * scale };
  }

  function getPos(id) {
    const n = topoData.nodes.find(n => n.id === id);
    if (!n) return null;
    return {
      x: (n.slot + 0.5) / slots * width,
      y: (n.row + 0.5) / rows * height,
    };
  }

  // Highlight all steps up to current
  for (let i = 0; i <= currentStepIdx; i++) {
    const step = currentFlow.steps[i];
    const isCurrent = i === currentStepIdx;
    const color = isCurrent ? '#58a6ff' : '#238636';
    const opacity = isCurrent ? 1.0 : 0.5;

    // Build path: from → via[] → to
    const pathNodes = [step.from_component];
    if (step.via) pathNodes.push(...step.via);
    pathNodes.push(step.to_component);

    // Draw path segments — lines start/end at node boundary, not center
    for (let j = 0; j < pathNodes.length - 1; j++) {
      const fromCenter = getPos(pathNodes[j]);
      const toCenter = getPos(pathNodes[j + 1]);
      if (!fromCenter || !toCenter) continue;

      const from = edgePoint(fromCenter, toCenter);
      const to = edgePoint(toCenter, fromCenter);

      flowLayer.append('line')
        .attr('x1', from.x).attr('y1', from.y)
        .attr('x2', to.x).attr('y2', to.y)
        .attr('stroke', color)
        .attr('stroke-width', isCurrent ? 3 : 2)
        .attr('stroke-opacity', opacity);
    }

    // Animate dot on current step — visits every waypoint edge
    if (isCurrent && pathNodes.length >= 2) {
      const centers = pathNodes.map(id => getPos(id)).filter(p => p !== null);
      // Build edge-clipped waypoints: first point exits its node, last enters its node,
      // intermediaries enter then exit
      const waypoints = [];
      if (centers.length >= 2) {
        waypoints.push(edgePoint(centers[0], centers[1])); // exit first node
        for (let w = 1; w < centers.length - 1; w++) {
          waypoints.push(centers[w]); // pass through center of intermediate nodes
        }
        waypoints.push(edgePoint(centers[centers.length - 1], centers[centers.length - 2])); // enter last node
      }
      if (waypoints.length >= 2) {
        const dot = flowLayer.append('circle')
          .attr('class', 'flow-dot')
          .attr('r', 5)
          .attr('cx', waypoints[0].x).attr('cy', waypoints[0].y);

        // Constant speed: duration per segment proportional to pixel distance
        const PIXELS_PER_MS = 0.15; // ~150 pixels per second
        const segDurations = [];
        for (let w = 1; w < waypoints.length; w++) {
          const dx = waypoints[w].x - waypoints[w-1].x;
          const dy = waypoints[w].y - waypoints[w-1].y;
          segDurations.push(Math.sqrt(dx*dx + dy*dy) / PIXELS_PER_MS);
        }
        const savedStepIdx = i;
        const isLastStep = i === currentFlow.steps.length - 1;

        function animateForward() {
          let t = dot;
          for (let w = 1; w < waypoints.length; w++) {
            t = t.transition()
              .duration(segDurations[w - 1])
              .ease(d3.easeLinear)
              .attr('cx', waypoints[w].x).attr('cy', waypoints[w].y);
          }
          t.on('end', function() {
            // Notify that the dot reached the destination
            if (onDotArrived) onDotArrived();
            // Only bounce back when not auto-playing and not the last step
            if (isLastStep || playing) return;
            animateBackward();
          });
        }

        function animateBackward() {
          let t = d3.select(dot.node());
          for (let w = waypoints.length - 2; w >= 0; w--) {
            t = t.transition()
              .duration(segDurations[w])
              .ease(d3.easeLinear)
              .attr('cx', waypoints[w].x).attr('cy', waypoints[w].y);
          }
          t.on('end', function() {
            if (currentStepIdx === savedStepIdx) animateForward();
          });
        }

        animateForward();
      }
    }

    // Highlight involved nodes
    pathNodes.forEach(nid => {
      svg.selectAll(`.node[data-id="${nid}"] rect`)
        .attr('fill', isCurrent ? '#1f2937' : '#161b22')
        .attr('stroke-width', isCurrent ? 3 : 2);
    });
  }
}

// Handle window resize
window.addEventListener('resize', () => {
  renderTopology();
  highlightFlow();
});

// Start
init();
</script>

</body>
</html>
