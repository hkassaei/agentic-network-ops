# =============================================================================
# Network Ontology — Protocol Stack Rules
# =============================================================================
# Hard invariants that the agent CANNOT override.
# These encode the protocol layering logic that LLMs consistently get wrong.
#
# Priority 1 = highest. A higher-priority rule overrides lower-priority analysis.

stack_rules:

  - id: network_fault_is_root_cause
    rule: "If a network-level fault is confirmed (packet loss, latency, unreachability), it is the root cause for all application-layer symptoms downstream."
    condition: "measure_rtt shows elevated RTT or packet loss, or interface error counters are non-zero"
    implication: "Stop investigating application-layer issues. The network fault explains all downstream symptoms."
    priority: 1
    invalidates: ["ims_signaling", "sip_analysis", "diameter_analysis", "config_analysis"]

  - id: unreachable_component_is_root_cause
    rule: "If a component is unreachable (100% packet loss, process not running, no SCTP/TCP/UDP listener), it is the root cause for all symptoms on interfaces connected to it."
    condition: "measure_rtt shows 100% loss, or component health check fails"
    implication: "All errors at peer nodes referencing this component are SYMPTOMS, not causes. Investigate why the component is unreachable."
    priority: 1
    invalidates: ["analysis of peer nodes that log errors about the unreachable component"]

  - id: ran_down_invalidates_ims
    rule: "If gNB is down (ran_ue=0, gnb=0), ALL IMS symptoms are secondary effects."
    condition: "ran_ue = 0 AND gnb = 0"
    implication: "Do not investigate IMS, SIP, Diameter, or Kamailio. The root cause is RAN failure."
    priority: 2
    invalidates: ["ims_signaling", "sip_analysis", "diameter_analysis"]

  - id: data_plane_dead_invalidates_sip
    rule: "If data plane is dead (GTP packets = 0 with sessions > 0), SIP timeouts are a CONSEQUENCE not a CAUSE."
    condition: "gtp_indatapktn3upf = 0 AND gtp_outdatapktn3upf = 0 AND upf_sessionnbr > 0"
    implication: "Do not investigate SIP timeout mechanics. The data plane fault is upstream."
    priority: 2
    invalidates: ["sip_timeout_analysis", "kamailio_transaction_analysis"]

  - id: idle_data_plane_is_normal
    rule: "Zero data plane throughput (upf_kbps = 0, upf_in_pps / upf_out_pps = 0, rtpengine_pps = 0) is NORMAL when no voice call is active. Active PDU sessions alone do NOT require traffic — they just provide a path for traffic when a call is placed. An idle network is a healthy network."
    condition: "upf_kbps <= 0.5 OR rtpengine_pps <= 0.5 OR upf_in_pps <= 0.5 OR upf_out_pps <= 0.5"
    implication: "Before rating the CORE or IMS layer as degraded based on zero data plane throughput, you MUST verify a voice call is actually in progress. Check for active call indicators: rtpengine_sessions{type='own'} > 0 OR total_sessions > 0 (RTPEngine), OR dialog_ng:active > 0 at P-CSCF/S-CSCF. If no active call indicator is present, zero data plane throughput is the expected idle state. DO NOT rate any layer YELLOW or RED based on idle data plane metrics. DO NOT list UPF or RTPEngine as suspect components just because they are idle."
    priority: 2
    invalidates: ["data_plane_failure_analysis_without_active_call_check", "treating_idle_rates_as_degradation"]
    examples:
      - "upf_kbps=0 with 4 PDU sessions but dialog_ng:active=0 → idle, not broken"
      - "rtpengine_pps=0 with owned_sessions=0 → no call, media relay has nothing to relay"
      - "upf_in_pps=0 and upf_out_pps=0 during no-call period → expected baseline"

  - id: upf_counters_are_directional
    rule: "The UPF GTP-U cumulative counters fivegs_ep_n3_gtp_indatapktn3upf (uplink: gNB→UPF) and fivegs_ep_n3_gtp_outdatapktn3upf (downlink: UPF→gNB) measure INDEPENDENT traffic directions over the container's lifetime. Their ratio is determined by whatever traffic has flowed historically (TCP downloads = more downlink, TCP uploads = more uplink, VoNR voice = roughly symmetric, idle SIP = roughly symmetric). Asymmetry between these counters is STRUCTURAL, not pathological. You CANNOT compute packet loss by subtracting one from the other."
    condition: "both fivegs_ep_n3_gtp_indatapktn3upf and fivegs_ep_n3_gtp_outdatapktn3upf present in observations"
    implication: "FORBIDDEN INFERENCE: Do NOT report the difference between in and out counters as 'packet loss', 'drop rate', or 'massive loss'. This is structurally wrong and will lead to false diagnoses. For actual packet loss detection, use one of these CORRECT methods: (1) rate() comparisons within the SAME direction over a time window, compared against the expected rate for the current traffic type (e.g., during a G.711 VoNR call, ~50 pps per direction is expected — significantly lower means loss); (2) RTCP-based metrics from RTPEngine: rate(rtpengine_packetloss_total[2m]) / rate(rtpengine_packetloss_samples_total[2m]) gives the sampled loss fraction from RTCP reports, which is the ground truth for voice media quality; (3) Interface-level drop counters on the tc qdisc (not currently exposed as a tool). If none of these correct methods indicate loss, then no loss is confirmed — asymmetry between cumulative counters alone is NOT evidence."
    priority: 2
    invalidates: ["packet_loss_from_cumulative_counter_subtraction", "in_minus_out_as_loss_calculation"]
    examples:
      - "in=3423, out=1267 → 65% asymmetry — STRUCTURAL (probably TCP downloads dominated lifetime), NOT loss"
      - "in=5000, out=4900 → roughly symmetric — consistent with voice or idle traffic"
      - "in=100, out=5000 → 98% asymmetry — STRUCTURAL (probably TCP downloads), still NOT loss evidence"
      - "During active G.711 call: rate(in[2m])=20 pps vs expected 50 pps → THIS would indicate loss (same-direction rate comparison)"

  - id: log_direction_rule
    rule: "A container logging 'connection refused to X' means X is down, not that the logging container is broken."
    condition: "Log message contains 'connection refused' or 'connection failed'"
    implication: "Investigate the REMOTE endpoint (X), not the container that logged the error."
    priority: 3
    invalidates: ["investigation of the component that produced the error log"]

  - id: baseline_delta_rule
    rule: "If a metric existed at the same value in the baseline, it is NOT a symptom of the current fault."
    condition: "metric_current == metric_baseline (or within typical_range)"
    implication: "Only metric DELTAS from baseline are symptoms. Pre-existing conditions are noise."
    priority: 3
    invalidates: ["treating pre-existing metrics as fault symptoms"]
    examples:
      - "httpclient:connfail at ~1400 is pre-existing SCP_BIND_IP noise"
      - "Diameter I_Open is a pre-existing display artifact"

  - id: transport_over_application
    rule: "If transport proves a packet couldn't physically reach a node, ignore all application-layer theories about what happened on that node."
    condition: "measure_rtt shows 100% loss OR check_process_listeners shows no listener"
    implication: "Transport-layer evidence takes priority over application-layer theories."
    priority: 2
    invalidates: ["application-layer analysis of the unreachable node"]

  - id: core_over_ims
    rule: "If 5G core data plane is dead, this is the root cause of resulting SIP timeouts."
    condition: "GTP packets = 0 or UPF has tc netem rule"
    implication: "IMS symptoms are secondary. Fix the data plane first."
    priority: 2
    invalidates: ["ims_signaling analysis when data plane is broken"]

  - id: evidence_over_theory
    rule: "A finding backed by tool output (config lines, ss tables, DB records, tc rules) always outweighs a finding based on absence of logs or theoretical reasoning."
    condition: "conflicting findings from different sources"
    implication: "When specialist findings conflict, prefer the one with raw evidence in tool output."
    priority: 3

  - id: 500_is_symptom_not_cause
    rule: "A 500 error at an intermediate SIP node (I-CSCF, S-CSCF) is almost always a SYMPTOM of a downstream failure, not the root cause."
    condition: "500 error observed at I-CSCF or S-CSCF"
    implication: "Trace the request path downstream to find where it actually failed."
    priority: 3
    invalidates: ["treating the 500-producing node as the root cause"]

  - id: check_both_ends
    rule: "Always trace a transaction to BOTH endpoints. Absence of a message at the destination is evidence of a delivery failure."
    condition: "investigating a SIP/Diameter transaction failure"
    implication: "If a message was sent but never received, the problem is BETWEEN the sender and receiver (transport layer)."
    priority: 3
