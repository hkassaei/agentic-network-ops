  # --- Metrics (Prometheus) scrape targets ---
  - id: metrics_scrape_amf
    name: Prometheus
    source: metrics
    target: amf
    protocol: HTTP
    transport: TCP/9091
    plane: management
    label: "Metrics Scrape"

  - id: metrics_scrape_smf
    name: Prometheus
    source: metrics
    target: smf
    protocol: HTTP
    transport: TCP/9091
    plane: management
    label: "Metrics Scrape"

  - id: metrics_scrape_upf
    name: Prometheus
    source: metrics
    target: upf
