# =============================================================================
# Network Operations Layer
# =============================================================================
#
# Infrastructure services for the operations layer:
#   - Ontology (Neo4j graph database for network domain knowledge)
#   - Ontology Loader (one-shot init: seeds Neo4j from YAML)
#
# The GUI runs as a Python process on the host (not containerized).
# See scripts/start-ops.sh for the full startup sequence.
#
# Usage:
#   ./scripts/start-ops.sh
#
# Requires:
#   - ops.env (copy from ops.env.example and fill in values)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Ontology — Neo4j graph database for network domain knowledge
  # ---------------------------------------------------------------------------
  ontology:
    image: neo4j:5-community
    container_name: ontology
    environment:
      - NEO4J_AUTH=neo4j/ontology
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      default:
        ipv4_address: 172.22.0.55

  # ---------------------------------------------------------------------------
  # Ontology Loader — One-shot: seeds Neo4j from YAML on startup
  # ---------------------------------------------------------------------------
  ontology-loader:
    build:
      context: .
      dockerfile: network_ontology/Dockerfile
    container_name: ontology_loader
    depends_on:
      ontology:
        condition: service_healthy
    restart: "no"
    networks:
      default:
        ipv4_address: 172.22.0.57

networks:
  default:
    name: docker_open5gs_default
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  neo4j_data:
    name: neo4j_ontology_data
