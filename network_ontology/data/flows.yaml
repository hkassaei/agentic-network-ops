# =============================================================================
# Network Ontology — Protocol Flows
# =============================================================================
# Structured definitions of how procedures flow through the network.
# Each flow is a sequence of steps showing which components are involved,
# what protocol is used at each hop, and what can go wrong.
#
# Used by:
#   - GUI flow visualization (animated step-through)
#   - RCA agents (mapping failures to specific steps in a procedure)
#   - Learning tool (understanding how the network works)
#
# Authoring discipline (per ADR flow-based-causal-chain-reasoning.md):
#   Every step must reflect what the code in this repo ACTUALLY does,
#   not an idealized 3GPP sequence. Deployment-specific compile flags
#   matter: WITH_RX is DISABLED and WITH_N5 is ENABLED in 5G mode
#   (see network/pcscf/pcscf_init.sh), so this stack performs policy
#   authorization via N5 (HTTP/2 SBI via SCP), not Diameter Rx.
#   `failure_modes` must enumerate the actual error branches the code
#   takes, not textbook fallbacks (e.g. our P-CSCF does
#   dlg_terminate / send_reply 412 on policy failure, not "fall back
#   to default bearer").

flows:

  # =========================================================================
  # 5G UE Registration (NAS)
  # =========================================================================

  ue_registration:
    name: "UE Registration"
    display_order: 1
    description: "UE registers with the 5G core network. Establishes NAS security, authenticates via AUSF/UDM, and receives a 5G-GUTI for subsequent procedures."
    use_case: 5g_core
    trigger: "UE powers on, enters coverage, or re-registration timer fires"
    preconditions:
      - "gNB connected to AMF (N2/SCTP active)"
      - "USIM provisioned with SUPI in UDR/MongoDB"

    steps:
      - order: 1
        from: e2e_ue1
        to: nr_gnb
        protocol: NR-Uu
        interface: Uu
        label: "RRC Connection Setup"
        description: "UE establishes radio connection with the gNB over the NR air interface."
        detail: |
          The UE performs cell search, synchronizes to the gNB's SSB
          (Synchronization Signal Block), and initiates the Random Access
          procedure (RACH). After the 4-step RACH completes, the gNB
          sends RRCSetup and the UE responds with RRCSetupComplete,
          which piggybacks the NAS Registration Request.
        failure_modes:
          - "No radio coverage → UE stays in RRC_IDLE, never attempts registration"
          - "RACH failure → UE retries with backoff, ran_ue stays at 0"
          - "gNB overloaded → RRC reject with wait timer"
        metrics_to_watch: [ran_ue, gnb]

      - order: 2
        from: nr_gnb
        to: amf
        protocol: NGAP
        interface: N2
        label: "Initial UE Message"
        description: "gNB forwards the NAS Registration Request to the AMF over NGAP."
        detail: |
          The gNB wraps the NAS Registration Request in an NGAP
          InitialUEMessage and sends it to the AMF over the N2 (SCTP)
          interface. The message includes the UE's NAS identity (SUCI —
          the encrypted form of the SUPI) and the registration type
          (initial, mobility, or periodic). The AMF selects itself as
          the serving AMF based on the GUAMI and tracking area.
        failure_modes:
          - "N2 SCTP link down → gNB cannot reach AMF, logs 'SCTP connection refused'"
          - "AMF overloaded → NGAP reject with congestion cause"
          - "Wrong PLMN → AMF rejects with 'PLMN not allowed'"
        metrics_to_watch: [amf_session, ran_ue]

      - order: 3
        from: amf
        to: ausf
        via: [scp]
        protocol: SBI
        interface: Nausf
        label: "Authentication Request"
        description: "AMF initiates 5G-AKA authentication by requesting auth vectors from AUSF."
        detail: |
          The AMF sends an Nausf_UEAuthentication_Authenticate request
          to the AUSF via the SCP. The request carries the SUCI (or SUPI
          if already resolved). The AUSF is the authentication anchor —
          it orchestrates the 5G-AKA protocol and ensures the UE is who
          it claims to be. The SCP routes the SBI request based on NRF
          service discovery.
        failure_modes:
          - "AUSF unreachable → AMF auth timeout, registration fails"
          - "SCP routing failure → SBI request never reaches AUSF"
        metrics_to_watch: [amf_session, fivegs_amffunction_amf_authfail]

      - order: 4
        from: ausf
        to: udm
        via: [scp]
        protocol: SBI
        interface: Nudm
        label: "Get Authentication Data"
        description: "AUSF requests authentication vectors from UDM."
        detail: |
          The AUSF sends Nudm_UEAuthentication_Get to the UDM. The UDM
          retrieves the subscriber's authentication credentials from the
          UDR (which reads from MongoDB) and generates the 5G-AKA
          authentication vector (RAND, AUTN, XRES*, KAUSF).
        failure_modes:
          - "UDM unreachable → AUSF returns auth failure to AMF"
          - "Subscriber not found in UDR/MongoDB → auth rejected"
          - "MongoDB down → UDR cannot retrieve credentials"
        metrics_to_watch: [fivegs_amffunction_amf_authfail]

      - order: 5
        from: ausf
        to: amf
        via: [scp]
        protocol: SBI
        interface: Nausf
        label: "Authentication Vector Response"
        description: "AUSF returns the auth challenge (RAND, AUTN) to the AMF."
        detail: |
          The AUSF stores the expected response (XRES*) locally and
          returns the authentication vector — RAND (random challenge)
          and AUTN (authentication token) — to the AMF in the
          Nausf_UEAuthentication_Authenticate response. The AMF will
          relay this challenge to the UE in the next step.
        failure_modes:
          - "SCP timeout on the return path → AMF never receives the vector"

      - order: 6
        from: amf
        to: e2e_ue1
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "Authentication Challenge"
        description: "AMF sends NAS Authentication Request with RAND and AUTN to the UE."
        detail: |
          The AMF sends a NAS Authentication Request containing the
          random challenge (RAND) and authentication token (AUTN) to
          the UE via the gNB. The UE must verify AUTN to prove the
          network is legitimate (mutual authentication) and compute
          its response (RES*).
        failure_modes:
          - "Radio link lost during delivery → procedure aborted, UE retries"
        metrics_to_watch: [fivegs_amffunction_amf_authfail]

      - order: 7
        from: e2e_ue1
        to: amf
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "Authentication Response"
        description: "UE sends NAS Authentication Response with RES* back to AMF."
        detail: |
          The UE's USIM verifies AUTN — this proves the network is
          legitimate (mutual authentication). It then computes the
          response RES* from RAND using the shared secret K, and
          derives the NAS security keys (KAMF). The UE sends back a
          NAS Authentication Response containing RES* via the gNB.
        failure_modes:
          - "AUTN verification fails at UE → UE sends Authentication Failure (MAC failure)"
          - "USIM not provisioned → UE cannot compute response"
          - "Sync failure → UE sends Authentication Failure with AUTS for re-synchronization"
        metrics_to_watch: [fivegs_amffunction_amf_authfail]

      - order: 8
        from: amf
        to: ausf
        via: [scp]
        protocol: SBI
        interface: Nausf
        label: "Authentication Confirmation"
        description: "AMF forwards the UE's RES* to AUSF for verification."
        detail: |
          The AMF sends Nausf_UEAuthentication_Authenticate with the
          UE's response (RES*) to the AUSF. The AUSF compares RES*
          against the stored XRES*. If they match, authentication
          succeeds and the AUSF derives the anchor key KSEAF, which
          is returned to the AMF. The AMF then derives KAMF and
          initiates NAS Security Mode Command to activate encryption
          and integrity protection on the NAS signaling.
        failure_modes:
          - "RES* mismatch → AUSF returns auth failure, fivegs_amffunction_amf_authfail increments"
          - "Sync failure → UE sends AUTS for re-synchronization"
        metrics_to_watch: [fivegs_amffunction_amf_authfail, amf_session]

      - order: 9
        from: amf
        to: udm
        via: [scp]
        protocol: SBI
        interface: Nudm
        label: "Registration Context Update"
        description: "AMF registers itself as the serving AMF for this UE at the UDM."
        detail: |
          The AMF sends Nudm_UECM_Registration to the UDM to record
          that this AMF is now serving this UE. The UDM stores the
          AMF address in the UE's context (in UDR/MongoDB). If the UE
          was previously registered at a different AMF, the UDM
          notifies the old AMF to release its context. The AMF also
          retrieves the UE's subscription data (Access and Mobility
          Subscription Data) via Nudm_SDM_Get.
        failure_modes:
          - "UDM unreachable → AMF cannot complete registration"
          - "MongoDB write failure → context not persisted, stale on failover"
        metrics_to_watch: [amf_session]

      - order: 10
        from: amf
        to: e2e_ue1
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "Registration Accept"
        description: "AMF sends NAS Registration Accept with 5G-GUTI to the UE."
        detail: |
          The AMF sends a NAS Registration Accept message to the UE,
          containing the assigned 5G-GUTI (Globally Unique Temporary
          Identifier), the allowed NSSAI (network slices), the
          registration area (list of tracking areas), and the periodic
          registration timer (T3512). The UE stores the 5G-GUTI and
          responds with Registration Complete. At this point, the UE is
          fully registered with the 5G core and can request PDU sessions.

          After registration, amf_session and ran_ue counters increment
          — these are the primary indicators of a successful registration.
        failure_modes:
          - "Radio link failure before Accept delivered → UE must retry"
          - "AMF crash between auth and accept → UE times out and re-registers"
        metrics_to_watch:
          - amf_session
          - ran_ue
          - gnb

    outcome:
      success: "UE is 5G-registered with a 5G-GUTI. NAS security is active. AMF and UDM hold the UE's context."
      observable_metrics:
        - "ran_ue increases by 1"
        - "amf_session increases by 1 (per PDN)"
        - "gnb stays at 1 (gNB remains connected)"

  # =========================================================================
  # IMS Registration
  # =========================================================================

  ims_registration:
    name: "IMS Registration"
    display_order: 3
    description: "UE registers with the IMS network for voice services. Establishes SIP identity, authenticates via HSS, and sets up QoS policy."
    use_case: vonr
    trigger: "UE powers on, or re-registration timer fires"
    preconditions:
      - "UE attached to 5G (NAS registration complete)"
      - "Internet and IMS PDU sessions established"
      - "gNB connected to AMF (N2 active)"

    steps:
      - order: 1
        from: e2e_ue1
        to: amf
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "5G NAS Registration"
        description: "UE attaches to 5G core via gNB. AMF handles authentication via AUSF/UDM."
        detail: |
          The UE sends a Registration Request over the NR-Uu air interface.
          The gNB forwards it to the AMF via NGAP (N2). The AMF triggers
          5G-AKA authentication through AUSF → UDM → UDR → MongoDB.
          On success, the UE is assigned a 5G-GUTI and can establish
          PDU sessions.
        failure_modes:
          - "N2 link down → AMF logs 'SCTP connection refused'"
          - "Auth failure → amf_authfail counter increments"
          - "gNB unreachable → ran_ue stays at 0"
        metrics_to_watch: [ran_ue, gnb, amf_session, fivegs_amffunction_amf_authfail]

      - order: 2
        from: e2e_ue1
        to: pcscf
        via: [nr_gnb, upf]
        protocol: SIP
        interface: Gm
        label: "SIP REGISTER via GTP-U"
        description: "UE sends SIP REGISTER through the IMS APN tunnel to P-CSCF."
        detail: |
          After the IMS PDU session is established (with the IMS APN),
          the UE sends a SIP REGISTER message over the IMS TUN interface.
          The message traverses the GTP-U tunnel: UE → gNB → UPF → P-CSCF.
          The P-CSCF is the first SIP hop — the UE's proxy for all IMS
          signaling. pjsua binds to the IMS TUN IP (192.168.101.x).
        failure_modes:
          - "GTP-U tunnel down → REGISTER never reaches P-CSCF"
          - "UPF packet loss → SIP retransmissions, eventual timeout"
          - "TCP/UDP mismatch → large SIP messages silently dropped"
        metrics_to_watch:
          - "fivegs_ep_n3_gtp_indatapktn3upf"
          - "ims_usrloc_pcscf:registered_contacts"

      - order: 3
        from: pcscf
        to: icscf
        protocol: SIP
        interface: Mw
        label: "Forward REGISTER to I-CSCF"
        description: "P-CSCF forwards the SIP REGISTER to the I-CSCF for routing into the IMS core."
        detail: |
          The P-CSCF calls pcscf_save_pending to track the pending contact,
          then forwards the REGISTER to the I-CSCF, the entry point to the
          IMS core. The I-CSCF's container address is resolved via DNS
          (icscf.ims.mnc...3gppnetwork.org → container IP).
          In this 5G deployment WITH_RX is compiled out, so no Rx-AAR
          runs before forwarding — the legacy "authorize signaling bearer
          before forward" path does not execute. N5 policy authorization
          for the signaling session is created later, on the 200 OK reply
          (see step 8).
        failure_modes:
          - "I-CSCF unreachable → SIP transaction timeout (408)"
          - "DNS failure → P-CSCF cannot resolve I-CSCF address"
          - "Network partition → Mw SIP path severed"

      - order: 4
        from: icscf
        to: pyhss
        protocol: Diameter
        interface: Cx
        label: "UAR — Find assigned S-CSCF"
        description: "I-CSCF sends Diameter UAR to HSS to find which S-CSCF serves this user."
        detail: |
          The I-CSCF calls I_perform_user_authorization_request, which
          sends a User-Authorization-Request (UAR) to the HSS over the
          Cx Diameter interface. The HSS checks if the user exists and
          returns the assigned S-CSCF address (or assigns one if this is
          the first registration). On UAR failure the I-CSCF responds
          with SIP 500 (`Server error on SCSCF Select (UAR)` or similar).
        failure_modes:
          - "HSS unreachable → ims_icscf:uar_timeouts increments, I-CSCF returns SIP 500"
          - "HSS overloaded/slow → cdp:timeout increments"
          - "User unknown at HSS → I-CSCF executes route[UAR_USER_UNKNOWN] and returns 403/404"
        metrics_to_watch:
          - "ims_icscf:uar_timeouts"
          - "ims_icscf:uar_avg_response_time"
          - "cdp:timeout"

      - order: 5
        from: icscf
        to: scscf
        protocol: SIP
        interface: Mw
        label: "Forward REGISTER to S-CSCF"
        description: "I-CSCF forwards the REGISTER to the assigned S-CSCF."
        detail: |
          Using the S-CSCF address returned by the HSS, the I-CSCF
          forwards the SIP REGISTER to the S-CSCF. The S-CSCF is the
          core registrar and call controller for this user.

      - order: 6
        from: scscf
        to: pyhss
        protocol: Diameter
        interface: Cx
        label: "MAR — Challenge the UE"
        description: "S-CSCF sends Diameter MAR to HSS, then challenges the UE with 401."
        detail: |
          On the first REGISTER, the S-CSCF calls ims_www_challenge,
          which sends a Multimedia-Authentication-Request (MAR) to the
          HSS to retrieve authentication vectors. The module itself then
          sends a SIP 401 Unauthorized challenge back to the UE via the
          I-CSCF and P-CSCF. The UE retries REGISTER with an
          Authorization header carrying the digest response. In this
          deployment MD5 Digest auth is used (not IMS-AKA) because
          pjsua doesn't support IPsec.
        failure_modes:
          - "HSS unreachable → ims_auth:mar_timeouts increments; MAR failure → SIP 500 upstream"
          - "Auth algorithm mismatch → 401/401 loop, UE eventually gives up"
        metrics_to_watch:
          - "ims_auth:mar_timeouts"
          - "ims_auth:mar_avg_response_time"

      - order: 7
        from: scscf
        to: pyhss
        protocol: Diameter
        interface: Cx
        label: "SAR — Register serving CSCF (after UE re-REGISTERs)"
        description: "On the UE's authenticated REGISTER, S-CSCF sends SAR to HSS and, on success, saves the contact via save()."
        detail: |
          The UE's second REGISTER (carrying the Authorization header)
          is routed back through P-CSCF → I-CSCF → S-CSCF. The S-CSCF
          validates the digest and calls save(), which internally sends
          a Server-Assignment-Request (SAR) to the HSS to bind the user
          to this S-CSCF instance. The HSS returns the user's service
          profile (iFC). On SAR success the user is stored in usrloc,
          accepted_regs increments, and the S-CSCF returns 200 OK.
          On SAR failure the S-CSCF responds 403.
        failure_modes:
          - "SAR timeout → ims_registrar_scscf:sar_timeouts increments, SIP 500 upstream"
          - "SAR error → S-CSCF sends 403 Forbidden to the UE"
          - "Missing iFC → S-CSCF logs 'No REGISTER match found in filter criteria'"
        metrics_to_watch:
          - "ims_registrar_scscf:sar_timeouts"
          - "ims_registrar_scscf:sar_avg_response_time"
          - "ims_registrar_scscf:accepted_regs"
          - "ims_registrar_scscf:rejected_regs"

      - order: 8
        from: scscf
        to: e2e_ue1
        via: [icscf, pcscf]
        protocol: SIP
        interface: Mw
        label: "200 OK — Registration complete"
        description: "S-CSCF sends SIP 200 OK back through the signaling chain to the UE."
        detail: |
          The 200 OK propagates back: S-CSCF → I-CSCF → P-CSCF → UE.
          At this point, the P-CSCF stores the UE's contact in
          ims_usrloc_pcscf (registered_contacts increments) and the
          S-CSCF stores the serving assignment in ims_usrloc_scscf
          (active_contacts increments).
          From the UE's perspective, registration is complete. However,
          the P-CSCF's REGISTER_reply handler still runs the N5 QoS
          policy authorization before returning (see step 9), and may
          intercept the 200 OK with a 412 on N5 failure.
        metrics_to_watch:
          - "ims_usrloc_pcscf:registered_contacts"
          - "ims_usrloc_scscf:active_contacts"
          - "ims_registrar_scscf:accepted_regs"
          - "script:register_success"

      - order: 9
        from: pcscf
        to: pcf
        via: [scp]
        protocol: HTTP/2 SBI
        interface: N5
        label: "N5 App Session Create — QoS policy for signaling"
        description: "On the 200 OK reply, P-CSCF POSTs an N5 app-session to PCF (via SCP) to authorize QoS for the signaling session."
        detail: |
          Within onreply_route[REGISTER_reply] on a 200 OK with expires>0,
          the P-CSCF calls route[N5_REG_PCF_POLICY_AUTH], which sends
          an HTTP/2 POST to the PCF at path
          /npcf-policyauthorization/v1/app-sessions via SCP
          (http://SCP_BIND_IP:SCP_BIND_PORT/...). The N5 body carries
          the UE's IP, the P-CSCF's IP, and a CONTROL medType for the
          SIP signaling flow. The PCF creates the policy and returns
          HTTP 201 with the new app-session ID in the Location header,
          which the P-CSCF stores in imsi_to_app_session_map.

          In 5G mode WITH_RX is compiled out; N5 is the only policy
          path. Note that even though N5 is triggered on the reply,
          a non-201 PCF response causes the P-CSCF to call
          send_reply("412","Register N5 QoS authorization failed") —
          the UE sees 412, not 200, so registration effectively fails
          when PCF or its dependencies (UDR → MongoDB) are down.
        failure_modes:
          - "PCF unreachable → N5 HTTP POST times out → P-CSCF sends SIP 412 to UE, pcscf_sip_error_ratio spikes"
          - "UDR/MongoDB down → PCF cannot fetch subscriber policy → PCF returns error → N5 POST fails → SIP 412"
          - "SCP down or misconfigured → httpclient:connfail increments, N5 POST fails"
        metrics_to_watch:
          - "fivegs_pcffunction_pa_policyamassoreq"
          - "fivegs_pcffunction_pa_policyamassosucc"
          - "fivegs_pcffunction_pa_sessionnbr"
          - "httpclient:connfail"
          - "httpclient:connok"
          - "derived.pcscf_sip_error_ratio"

    outcome:
      success: "UE is IMS-registered. P-CSCF has contact, S-CSCF has assignment, QoS policy active."
      observable_metrics:
        - "ims_usrloc_pcscf:registered_contacts increases by 1"
        - "ims_usrloc_scscf:active_contacts increases by 1"
        - "ims_registrar_scscf:accepted_regs increases by 1"
        - "script:register_success increases by 1"

  # =========================================================================
  # VoNR Call Setup (INVITE)
  # =========================================================================

  vonr_call_setup:
    name: "VoNR Call Setup"
    display_order: 5
    description: "UE1 initiates a voice call to UE2 over the IMS network. Establishes SIP dialog, allocates RTP media path, and sets up dedicated QoS bearers."
    use_case: vonr
    trigger: "User initiates a voice call (pjsua 'm' command)"
    preconditions:
      - "Both UE1 and UE2 IMS-registered (registered_contacts = 2)"
      - "IMS PDU sessions active for both UEs"
      - "RTPEngine running for media relay"

    steps:
      - order: 1
        from: e2e_ue1
        to: pcscf
        via: [nr_gnb, upf]
        protocol: SIP
        interface: Gm
        label: "INVITE from UE1"
        description: "UE1 sends SIP INVITE with SDP offer through the data plane to P-CSCF."
        detail: |
          The caller (UE1) sends a SIP INVITE to the callee's SIP URI
          (sip:IMSI@ims.domain). The INVITE includes an SDP offer with
          the caller's RTP media capabilities. The message traverses
          the GTP-U data plane: UE1 → gNB → UPF → P-CSCF.
          Note: The INVITE with SDP is typically >1300 bytes. If
          udp_mtu_try_proto=TCP, the P-CSCF may switch to TCP for
          forwarding.
        failure_modes:
          - "GTP-U data plane down → INVITE never reaches P-CSCF"
          - "TCP/UDP mismatch → large INVITE silently dropped"
        metrics_to_watch:
          - "core:rcv_requests_invite"
          - "sl:1xx_replies"

      - order: 2
        from: pcscf
        to: pcf
        via: [scp]
        protocol: HTTP/2 SBI
        interface: N5
        label: "N5 App Session Create (originating) — QoS authorization"
        description: "Before forwarding the INVITE upstream, P-CSCF POSTs an N5 app-session to PCF via SCP to authorize QoS for the voice media."
        detail: |
          In 5G mode (WITH_N5 compiled in, WITH_RX compiled out), the
          P-CSCF's MO route calls route[N5_INIT_REQ] on every INVITE.
          This sends an HTTP/2 POST to
          /npcf-policyauthorization/v1/app-sessions via SCP
          (http://SCP_BIND_IP:SCP_BIND_PORT/...). The body contains
          the origiting UE's IP/port and an mmtel service profile.
          The PCF must authorize the session and return HTTP 201
          with the new app-session ID in the Location header, which
          P-CSCF stores in imsi_to_app_session_map for later use.

          **This step gates INVITE forwarding.** If the PCF returns
          anything other than 201, the P-CSCF calls
          send_reply("412","Register N5 QoS authorization failed")
          and exits — the INVITE is never relayed upstream and UE1
          sees SIP 412. Consequently, any failure in the PCF's data
          path (e.g. UDR → MongoDB down so PCF cannot fetch subscriber
          policy) surfaces as 100% SIP error ratio at P-CSCF.
        failure_modes:
          - "PCF unreachable → N5 POST times out → P-CSCF sends SIP 412, pcscf_sip_error_ratio spikes"
          - "UDR/MongoDB down → PCF cannot fetch subscriber policy → non-201 → SIP 412"
          - "SCP down or misconfigured → httpclient:connfail increments"
        metrics_to_watch:
          - "fivegs_pcffunction_pa_policyamassoreq"
          - "fivegs_pcffunction_pa_policyamassosucc"
          - "fivegs_pcffunction_pa_sessionnbr"
          - "httpclient:connfail"
          - "derived.pcscf_sip_error_ratio"

      - order: 3
        from: pcscf
        to: rtpengine
        protocol: ng
        interface: ng
        label: "RTPEngine: allocate media relay"
        description: "P-CSCF instructs RTPEngine to allocate a media relay for this call."
        detail: |
          The P-CSCF sends an 'offer' command to RTPEngine via the ng
          protocol. RTPEngine allocates RTP/RTCP port pairs for the
          media relay and rewrites the SDP to point media through itself.
          This ensures RTP flows: UE1 → UPF → RTPEngine → UPF → UE2.
        failure_modes:
          - "RTPEngine down → no media relay, call may fail or have no audio"
        metrics_to_watch:
          - "rtpengine_sessions"

      - order: 4
        from: pcscf
        to: scscf
        protocol: SIP
        interface: Mw
        label: "Forward INVITE to originating S-CSCF"
        description: "P-CSCF forwards the INVITE to the S-CSCF serving UE1 (originating leg)."
        detail: |
          After the N5 authorization succeeds and RTPEngine allocates
          the media relay, the P-CSCF forwards the INVITE. The S-CSCF
          evaluates the Initial Filter Criteria (iFC) for the
          originating user.

      - order: 5
        from: scscf
        to: icscf
        protocol: SIP
        interface: Mw
        label: "Route to terminating I-CSCF"
        description: "Originating S-CSCF routes the INVITE to the I-CSCF for the terminating user."
        detail: |
          The S-CSCF determines that the callee is in the same network
          and sends the INVITE to the I-CSCF, which will look up the
          terminating S-CSCF for UE2.

      - order: 6
        from: icscf
        to: pyhss
        protocol: Diameter
        interface: Cx
        label: "LIR — Find terminating S-CSCF"
        description: "I-CSCF sends Diameter LIR to HSS to find which S-CSCF serves UE2."
        detail: |
          The I-CSCF calls I_perform_location_information_request,
          which sends a Location-Info-Request (LIR) to the HSS for the
          callee's IMPU. The HSS returns the S-CSCF address where UE2
          is registered. On LIR error the I-CSCF returns SIP 500
          (`Server error on LIR select next S-CSCF`).
        failure_modes:
          - "HSS unreachable → ims_icscf:lir_timeouts increments, SIP 500 upstream"
          - "UE2 not registered → 500 'Server error on LIR select next S-CSCF'"
        metrics_to_watch:
          - "ims_icscf:lir_timeouts"
          - "ims_icscf:lir_avg_response_time"

      - order: 7
        from: icscf
        to: scscf
        protocol: SIP
        interface: Mw
        label: "Forward INVITE to terminating S-CSCF"
        description: "I-CSCF forwards the INVITE to the S-CSCF serving UE2."

      - order: 8
        from: scscf
        to: pcscf
        protocol: SIP
        interface: Mw
        label: "Forward INVITE to terminating P-CSCF"
        description: "Terminating S-CSCF forwards the INVITE toward UE2 via the P-CSCF."
        detail: |
          The S-CSCF looks up UE2's registered contact from usrloc
          and forwards the INVITE to the P-CSCF, which will deliver
          it to UE2 via the GTP-U data plane.

      - order: 9
        from: pcscf
        to: pcf
        via: [scp]
        protocol: HTTP/2 SBI
        interface: N5
        label: "N5 App Session Create (terminating) — QoS authorization"
        description: "Before delivering the INVITE to UE2, the terminating P-CSCF POSTs an N5 app-session to PCF via SCP (mirror of step 2)."
        detail: |
          The terminating P-CSCF's MT route calls route[N5_INIT_MT_REQ]
          on every INVITE. Same semantics as the originating side in
          step 2: POST to /npcf-policyauthorization/v1/app-sessions;
          on non-201 response, send_reply("412",...) and stop
          delivery to UE2. Both sides must succeed for the call to
          progress end-to-end.
        failure_modes:
          - "PCF unreachable → N5 POST times out → terminating P-CSCF sends SIP 412, call fails"
          - "UDR/MongoDB down on terminating side → non-201 → SIP 412"
        metrics_to_watch:
          - "fivegs_pcffunction_pa_sessionnbr"
          - "httpclient:connfail"
          - "derived.pcscf_sip_error_ratio"

      - order: 10
        from: pcscf
        to: e2e_ue2
        via: [upf, nr_gnb]
        protocol: SIP
        interface: Gm
        label: "INVITE to UE2"
        description: "P-CSCF delivers the INVITE to UE2 through the data plane."
        detail: |
          The P-CSCF sends the INVITE to UE2's registered contact
          address (192.168.101.x:5060) via the GTP-U tunnel. UE2's
          pjsua receives the INVITE and auto-answers (200 OK).
        failure_modes:
          - "TCP/UDP mismatch → INVITE dropped (UE only listens on UDP)"
          - "GTP-U data plane issue → INVITE never reaches UE2"
          - "UE2 not listening → SIP timeout (408)"

      - order: 11
        from: e2e_ue2
        to: e2e_ue1
        via: [nr_gnb, upf, pcscf, scscf, icscf, scscf, pcscf, upf, nr_gnb]
        protocol: SIP
        interface: Mw
        label: "180/183/200 → N5 PATCH → ACK — Call established"
        description: "UE2's response propagates back; each P-CSCF patches its N5 session with media details; UE1 sends ACK."
        detail: |
          When UE2's 180/183/200 response carrying SDP reaches a P-CSCF
          on the return path, the P-CSCF's reply route runs
          route[N5_PATCH_MT_REQ] on the terminating side and
          route[N5_PATCH_REQ] on the originating side. These HTTP/2
          PATCH requests update the existing N5 app-sessions at PCF
          with the agreed media parameters (ports, codecs) so the PCF
          can program QoS for the media flow (5QI=1 for conversational
          voice). On PATCH failure the P-CSCF sends
          send_reply("412","MOC N5 QoS Session modify faild") and the
          call fails at this point.

          After both N5 PATCH calls succeed, the 200 OK completes its
          trip back to UE1, which sends ACK. dialog_ng:active
          increments at P-CSCF and S-CSCF; the call state is CONFIRMED.
          bearers_active on the SMF rises from its baseline (typically
          4 default bearers → 6 with the two voice QoS flows installed).
        failure_modes:
          - "PCF issue during PATCH → P-CSCF sends SIP 412 on the reply path, call fails"
          - "Signaling path latency → 200 OK retransmitted, call may still succeed"
        metrics_to_watch:
          - "dialog_ng:active"
          - "dialog_ng:processed"
          - "bearers_active"

      - order: 12
        from: e2e_ue1
        to: e2e_ue2
        via: [nr_gnb, upf, rtpengine, upf, nr_gnb]
        protocol: RTP
        interface: N3
        label: "RTP media — voice call active"
        description: "Bidirectional RTP voice media flows through the data plane via RTPEngine."
        detail: |
          Voice packets (RTP) flow: UE1 → gNB → UPF → RTPEngine → UPF → gNB → UE2
          (and reverse). RTPEngine acts as a media relay, enabling
          call recording, codec transcoding, and NAT traversal.
          Both UEs' jitter buffers are active. The GTP-U packet
          counters at the UPF reflect the media traffic.
        failure_modes:
          - "UPF packet loss → RTP degradation, jitter buffer resets"
          - "RTPEngine down → no audio (one-way or no-way)"
          - "Data plane latency → voice delay, echo"
        metrics_to_watch:
          - "fivegs_ep_n3_gtp_indatapktn3upf"
          - "fivegs_ep_n3_gtp_outdatapktn3upf"
          - "rtpengine_sessions"

    outcome:
      success: "Voice call is active between UE1 and UE2 with dedicated QoS bearers."
      observable_metrics:
        - "dialog_ng:active increases by 2 (one per direction)"
        - "bearers_active increases from 4 to 6"
        - "rtpengine:current_sessions increases by 1"
        - "GTP-U packet counters actively incrementing"

  # =========================================================================
  # VoNR Call Teardown (BYE)
  # =========================================================================

  vonr_call_teardown:
    name: "VoNR Call Teardown"
    display_order: 6
    description: "One party hangs up, terminating the VoNR voice call. Releases SIP dialog, RTP media, and dedicated QoS bearers."
    use_case: vonr
    trigger: "User hangs up (pjsua 'h' command or BYE from remote)"
    preconditions:
      - "Active VoNR call between UE1 and UE2"
      - "dialog_ng:active = 2, bearers_active = 6"

    steps:
      - order: 1
        from: e2e_ue1
        to: pcscf
        via: [nr_gnb, upf]
        protocol: SIP
        interface: Gm
        label: "BYE from UE1"
        description: "UE1 sends SIP BYE through the data plane to P-CSCF to end the call."
        detail: |
          The hanging-up party (UE1) sends a SIP BYE within the existing
          dialog. The BYE traverses the GTP-U tunnel: UE1 → gNB → UPF → P-CSCF.
          The P-CSCF matches the BYE to the active dialog using Call-ID and tags.
        failure_modes:
          - "GTP-U data plane down → BYE never reaches P-CSCF, call hangs"
          - "Dialog mismatch → 481 Call/Transaction Does Not Exist"
        metrics_to_watch:
          - "core:rcv_requests_bye"

      - order: 2
        from: pcscf
        to: rtpengine
        protocol: ng
        interface: ng
        label: "RTPEngine: release media relay"
        description: "P-CSCF instructs RTPEngine to tear down the media relay for this call."
        detail: |
          The P-CSCF sends a 'delete' command to RTPEngine via the ng protocol.
          RTPEngine releases the allocated RTP/RTCP port pairs and stops relaying
          media packets. rtpengine_pps drops to 0 and the session count decrements.
        metrics_to_watch:
          - "rtpengine_pps"
          - "rtpengine_active_sessions"

      - order: 3
        from: pcscf
        to: scscf
        via: [icscf]
        protocol: SIP
        interface: Mw
        label: "Forward BYE through IMS core"
        description: "P-CSCF forwards the BYE through I-CSCF to the S-CSCF."
        detail: |
          The BYE follows the recorded route through the IMS signaling chain.
          The S-CSCF processes the BYE, decrements its dialog count, and
          forwards it toward the terminating side.

      - order: 4
        from: scscf
        to: e2e_ue2
        via: [pcscf, upf, nr_gnb]
        protocol: SIP
        interface: Mw
        label: "BYE delivered to UE2"
        description: "S-CSCF forwards the BYE to UE2 via P-CSCF and the data plane."
        detail: |
          The BYE reaches UE2 through the terminating P-CSCF and the GTP-U
          tunnel. UE2's pjsua receives the BYE and responds with 200 OK.
          The call state changes to DISCONNECTED on both sides.
        failure_modes:
          - "UE2 unreachable → BYE timeout, call resources not released cleanly"

      - order: 5
        from: e2e_ue2
        to: e2e_ue1
        via: [nr_gnb, upf, pcscf, scscf, icscf, pcscf, upf, nr_gnb]
        protocol: SIP
        interface: Mw
        label: "200 OK — Call terminated"
        description: "UE2 confirms the BYE with 200 OK, propagated back to UE1."
        detail: |
          The 200 OK to BYE traverses the full signaling chain back to UE1.
          At this point dialog_ng:active decrements at P-CSCF and S-CSCF.
          Both UEs' call state is now DISCONNECTED.
        metrics_to_watch:
          - "dialog_ng:active"

      - order: 6
        from: pcscf
        to: pcf
        via: [scp]
        protocol: HTTP/2 SBI
        interface: N5
        label: "N5 App Session Delete — Release dedicated QoS"
        description: "P-CSCF POSTs to .../app-sessions/<id>/delete at PCF (via SCP) to release the voice QoS bearers."
        detail: |
          In 5G mode the P-CSCF's BYE handling calls route[N5_MOC_TERM]
          (originating) or route[N5_MTC_TERM] (terminating). Each
          issues an HTTP/2 POST to the PCF at path
          /npcf-policyauthorization/v1/app-sessions/<app_session>/delete
          via SCP. The app-session ID is looked up from
          imsi_to_app_session_map by UE IMSI. The PCF removes the
          policy authorization and notifies the SMF, which tears down
          the dedicated QoS flows (5QI=1) via PFCP on the UPF.
          bearers_active drops from 6 back to 4.
          In 5G mode WITH_RX is compiled out, so there is no Rx STR;
          all policy teardown is via N5.
        failure_modes:
          - "PCF unreachable → N5 DELETE fails → dedicated QoS lingers on UPF (resource leak until SMF times out)"
          - "App-session ID missing from hash table → teardown skipped silently (P-CSCF logs 'we dont have AppSessionID')"
          - "PFCP failure between SMF and UPF → QoS flow not removed from UPF"
        metrics_to_watch:
          - "bearers_active"
          - "fivegs_pcffunction_pa_sessionnbr"

    outcome:
      success: "Call terminated. SIP dialog closed, media relay released, QoS bearers removed."
      observable_metrics:
        - "dialog_ng:active decreases by 2"
        - "bearers_active decreases from 6 to 4"
        - "rtpengine_active_sessions decreases by 1"
        - "rtpengine_pps drops to 0"

  # =========================================================================
  # PDU Session Establishment
  # =========================================================================

  pdu_session_establishment:
    name: "PDU Session Establishment"
    display_order: 2
    description: "UE requests a PDU session (data connection) from the 5G core. AMF orchestrates session creation through SMF and UPF, establishing the GTP-U tunnel for user data."
    use_case: 5g_core
    trigger: "UE sends PDU Session Establishment Request (after NAS registration)"
    preconditions:
      - "UE registered with AMF (NAS registration complete)"
      - "gNB connected to AMF via N2"
      - "SMF and UPF running"

    steps:
      - order: 1
        from: e2e_ue1
        to: amf
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "PDU Session Establishment Request"
        description: "UE sends NAS PDU Session Establishment Request to AMF via gNB."
        detail: |
          The UE initiates a PDU session by sending a NAS PDU Session
          Establishment Request. It specifies the requested DNN (Data Network
          Name) — either 'internet' for general data or the IMS APN for
          VoLTE/VoNR signaling. The gNB forwards the NAS message to the AMF
          over NGAP (N2 interface).
        failure_modes:
          - "N2 link down → request never reaches AMF"
          - "AMF overloaded → NAS timeout at UE"
        metrics_to_watch:
          - "fivegs_smffunction_sm_pdusessioncreationreq"

      - order: 2
        from: amf
        to: smf
        via: [scp]
        protocol: SBI
        interface: Nsmf
        label: "SMF Session Create (Nsmf)"
        description: "AMF selects an SMF and sends a session create request via SBI (routed through SCP)."
        detail: |
          The AMF selects an SMF based on the requested DNN and S-NSSAI
          (network slice). It sends an Nsmf_PDUSession_CreateSMContext
          request via HTTP/2 SBI through the SCP (indirect/delegated
          model — confirmed by `scp:` entry in amf.yaml's
          `sbi.client`). The SMF is responsible for managing the PDU
          session lifecycle, including UPF selection and QoS.
        failure_modes:
          - "SMF selection failure → no SMF for requested DNN"
          - "SBI/SCP timeout → session creation stalls"
        metrics_to_watch:
          - "fivegs_smffunction_sm_sessionnbr"

      - order: 3
        from: smf
        to: pcf
        via: [scp]
        protocol: SBI
        interface: Npcf
        label: "Policy authorization from PCF"
        description: "SMF requests session policy and QoS rules from the PCF via SCP."
        detail: |
          The SMF sends an Npcf_SMPolicyControl_Create request to the PCF
          (routed through SCP on our SBA deployment). The PCF in turn
          queries the UDR for the subscriber's policy data — and the UDR
          reads from MongoDB. On success the PCF returns authorized QoS
          rules (default 5QI, AMBR limits, PCC rules); on failure, Open5GS
          SMF falls back to local default policy for this PDU session.
        failure_modes:
          - "PCF unreachable → SMF uses local default policy (session still created)"
          - "UDR → MongoDB down → PCF cannot fetch subscriber policy, SMF falls back to local"
          - "SCP down → SMF cannot reach PCF via SBI"
        metrics_to_watch:
          - "fivegs_pcffunction_pa_sessionnbr"
          - "fivegs_pcffunction_pa_policysmassoreq"
          - "fivegs_pcffunction_pa_policysmassosucc"

      - order: 4
        from: smf
        to: upf
        protocol: PFCP
        interface: N4
        label: "PFCP Session Establishment"
        description: "SMF creates a PFCP session on the UPF to set up the user plane tunnel."
        detail: |
          The SMF sends a PFCP Session Establishment Request to the UPF over
          the N4 interface. This installs Packet Detection Rules (PDRs) and
          Forwarding Action Rules (FARs) that tell the UPF how to handle
          packets for this session — which GTP-U tunnel to use, which QFI
          to apply, and where to forward uplink/downlink traffic. The UPF
          allocates its N3 GTP-U endpoint (IP address and TEID) and returns
          them in the PFCP Session Establishment Response.
        failure_modes:
          - "UPF unreachable → PFCP timeout, session creation fails"
          - "PFCP association lost → all sessions on that UPF fail"
        metrics_to_watch:
          - "fivegs_upffunction_upf_sessionnbr"
          - "pfcp_sessions_active"

      - order: 5
        from: smf
        to: amf
        via: [scp]
        protocol: SBI
        interface: Nsmf
        label: "Session Create Response"
        description: "SMF returns N2 tunnel info (UPF's TEID and IP) to the AMF via SCP."
        detail: |
          The SMF sends the Nsmf_PDUSession_CreateSMContext response back
          to the AMF, routed through SCP. This response carries the N2
          SM Information — including the UPF's GTP-U tunnel endpoint
          (IP and TEID) and the QoS flow parameters. The AMF needs this
          information to instruct the gNB to set up its end of the N3
          GTP-U tunnel in the next step.
        failure_modes:
          - "SBI/SCP timeout → AMF never receives tunnel info, session stalls"

      - order: 6
        from: amf
        to: nr_gnb
        protocol: NGAP
        interface: N2
        label: "N2 PDU Session Resource Setup"
        description: "AMF sends PDU Session Resource Setup Request to gNB with UPF tunnel info."
        detail: |
          The AMF sends an NGAP PDU Session Resource Setup Request to the
          gNB, containing the UPF's GTP-U endpoint (TEID and IP address).
          The gNB allocates radio resources — a Data Radio Bearer (DRB) —
          for the PDU session and establishes its end of the N3 GTP-U
          tunnel toward the UPF.
        failure_modes:
          - "gNB resource exhaustion → session setup rejected"
          - "N2 link flap → NGAP transaction timeout"
        metrics_to_watch:
          - "ran_ue"
          - "gnb"

      - order: 7
        from: nr_gnb
        to: amf
        protocol: NGAP
        interface: N2
        label: "N2 PDU Session Resource Setup Response"
        description: "gNB returns its own GTP-U endpoint (TEID and IP) to the AMF."
        detail: |
          The gNB responds with an NGAP PDU Session Resource Setup Response
          containing its own N3 GTP-U tunnel endpoint (IP and TEID). The AMF
          forwards this information to the SMF so the SMF can complete the
          bidirectional tunnel by updating the UPF.
        failure_modes:
          - "gNB DRB setup failure → response carries failure cause"

      - order: 8
        from: amf
        to: smf
        via: [scp]
        protocol: SBI
        interface: Nsmf
        label: "N2 Info to SMF (gNB tunnel)"
        description: "AMF forwards the gNB's GTP-U endpoint to the SMF via SCP."
        detail: |
          The AMF sends Nsmf_PDUSession_UpdateSMContext to the SMF
          (routed through SCP) with the N2 SM Information received from
          the gNB — specifically the gNB's GTP-U tunnel endpoint. The
          SMF now has both ends of the N3 tunnel (UPF endpoint from
          step 4, gNB endpoint from this step) and can finalize the
          user plane path.
        failure_modes:
          - "SBI/SCP timeout → SMF never receives gNB endpoint, tunnel incomplete"

      - order: 9
        from: smf
        to: upf
        protocol: PFCP
        interface: N4
        label: "PFCP Session Modification (gNB tunnel)"
        description: "SMF updates the UPF with the gNB's GTP-U endpoint to complete the N3 tunnel."
        detail: |
          The SMF sends a PFCP Session Modification Request to the UPF. This
          updates the FARs with the gNB's tunnel info (IP and TEID), completing
          the bidirectional N3 GTP-U tunnel: gNB ←→ UPF. Data can now flow
          end-to-end between the UE and the data network.
        metrics_to_watch:
          - "fivegs_ep_n3_gtp_indatapktn3upf"
          - "fivegs_ep_n3_gtp_outdatapktn3upf"

      - order: 10
        from: amf
        to: e2e_ue1
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "PDU Session Establishment Accept"
        description: "AMF sends NAS PDU Session Establishment Accept to the UE."
        detail: |
          The AMF sends the acceptance back to the UE, including the assigned
          IP address (e.g., 10.45.0.x for internet, 192.168.101.x for IMS APN),
          QoS parameters, and the DNN. The UE creates a TUN interface bound
          to this IP address. For the IMS APN, pjsua will later bind to this
          IP for SIP registration.
        metrics_to_watch:
          - "fivegs_smffunction_sm_pdusessioncreationsucc"
          - "amf_session"

    outcome:
      success: "PDU session established. GTP-U tunnel active between gNB and UPF. UE has IP connectivity."
      observable_metrics:
        - "fivegs_smffunction_sm_sessionnbr increases by 1"
        - "fivegs_upffunction_upf_sessionnbr increases by 1"
        - "pfcp_sessions_active increases by 1"
        - "amf_session increases by 1"

  # =========================================================================
  # UE Deregistration
  # =========================================================================

  ue_deregistration:
    name: "UE Deregistration"
    display_order: 7
    description: "UE deregisters from the 5G network, releasing all resources: NAS registration, PDU sessions, IMS registration, and associated bearers."
    use_case: 5g_core
    trigger: "UE powers off, or network-initiated deregistration"
    preconditions:
      - "UE registered with AMF"
      - "One or more PDU sessions active"
      - "Optionally IMS-registered"

    steps:
      - order: 1
        from: e2e_ue1
        to: amf
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "Deregistration Request"
        description: "UE sends NAS Deregistration Request to AMF."
        detail: |
          The UE sends a Deregistration Request (type: switch off or normal)
          to the AMF via the gNB. This triggers the release of all resources
          associated with this UE. If the UE is IMS-registered, the IMS
          registration will also be lost (P-CSCF detects the contact
          becoming unreachable).
        failure_modes:
          - "N2 link down → deregistration fails, AMF times out and force-deregisters"
        metrics_to_watch:
          - "ran_ue"
          - "amf_session"

      - order: 2
        from: amf
        to: smf
        via: [scp]
        protocol: SBI
        interface: Nsmf
        label: "Release all PDU sessions"
        description: "AMF instructs SMF (via SCP) to release all PDU sessions for this UE."
        detail: |
          The AMF sends Nsmf_PDUSession_ReleaseSMContext for each of
          the UE's active PDU sessions, routed through SCP. The SMF
          initiates teardown of the user plane tunnels and QoS
          resources. For 2 PDU sessions (internet + IMS APN), this is
          called twice.
        metrics_to_watch:
          - "fivegs_smffunction_sm_sessionnbr"

      - order: 3
        from: smf
        to: upf
        protocol: PFCP
        interface: N4
        label: "PFCP Session Deletion"
        description: "SMF sends PFCP Session Deletion to UPF for each PDU session."
        detail: |
          The SMF sends PFCP Session Deletion Requests to the UPF for each
          session. The UPF removes all PDRs, FARs, and GTP-U tunnel state.
          The N3 GTP-U tunnel is torn down. GTP-U packet counters stop
          incrementing for this UE.
        metrics_to_watch:
          - "fivegs_upffunction_upf_sessionnbr"
          - "pfcp_sessions_active"

      - order: 4
        from: amf
        to: e2e_ue1
        via: [nr_gnb]
        protocol: NAS
        interface: N1
        label: "Deregistration Accept"
        description: "AMF confirms deregistration. UE is now detached from the network."
        detail: |
          The AMF sends a Deregistration Accept to the UE. The UE's NAS
          state transitions to DEREGISTERED. The gNB releases the RRC
          connection and radio resources. ran_ue decrements. If IMS was
          active, P-CSCF will detect the contact loss when the next
          re-REGISTER timer fires and fails.
        metrics_to_watch:
          - "ran_ue"
          - "ims_usrloc_pcscf:registered_contacts"

      - order: 5
        from: amf
        to: udm
        via: [scp]
        protocol: SBI
        interface: Nudm
        label: "UDM context release"
        description: "AMF notifies UDM (via SCP) that the UE context is released."
        detail: |
          The AMF sends an Nudm_UECM_Deregistration to the UDM (routed
          through SCP), which updates the UE's context in the UDR. The
          UDM clears the serving AMF assignment. If the UE registers
          again, it will go through the full registration procedure
          from scratch.

    outcome:
      success: "UE fully deregistered. All PDU sessions released, NAS context cleared."
      observable_metrics:
        - "ran_ue decreases by 1"
        - "amf_session decreases by 2 (internet + IMS PDU sessions)"
        - "fivegs_smffunction_sm_sessionnbr decreases by 2"
        - "fivegs_upffunction_upf_sessionnbr decreases by 2"
        - "ims_usrloc_pcscf:registered_contacts eventually decreases by 1"

  # =========================================================================
  # Diameter Authentication (Cx Detail)
  # =========================================================================

  diameter_cx_authentication:
    name: "Diameter Cx Authentication"
    display_order: 4
    description: "Detailed view of the Diameter Cx exchanges between I-CSCF/S-CSCF and HSS during IMS registration. Shows UAR, MAR, and SAR message flows."
    use_case: ims
    trigger: "IMS REGISTER arrives at I-CSCF (part of IMS Registration flow)"
    preconditions:
      - "I-CSCF and S-CSCF have Diameter Cx connections to HSS"
      - "HSS has the subscriber provisioned"

    steps:
      - order: 1
        from: icscf
        to: pyhss
        protocol: Diameter
        interface: Cx
        label: "UAR — User-Authorization-Request (conditional)"
        description: "I-CSCF asks HSS if the user exists and which S-CSCF is assigned. Skipped on fast-path re-registrations when the I-CSCF already has an S-CSCF list for this user."
        detail: |
          The I-CSCF's REGISTER route (icscf.cfg) first checks whether
          it already has an S-CSCF list for this user (via
          `I_scscf_select`). If yes, the UAR is SKIPPED and the
          REGISTER is routed directly to the cached S-CSCF. If no
          (first registration, or cache expired), the I-CSCF calls
          `I_perform_user_authorization_request`, which sends a
          User-Authorization-Request (UAR) with the user's IMPU
          (sip:001010123456789@ims.domain) and visited network
          identity. The HSS checks:
          1. Does this user exist?
          2. Is the user already registered? If so, which S-CSCF?
          3. If not registered, should the I-CSCF select an S-CSCF?

          The HSS returns a UAA (User-Authorization-Answer) with the
          result code and optionally the S-CSCF address. On error the
          I-CSCF returns SIP 500 ("Server error on SCSCF Select (UAR)"
          or similar).
        failure_modes:
          - "HSS unreachable → ims_icscf:uar_timeouts increments, I-CSCF returns SIP 500"
          - "Unknown user → route[UAR_USER_UNKNOWN] executes, I-CSCF returns 403/404"
          - "Diameter connection lost → cdp:timeout increments"
        metrics_to_watch:
          - "ims_icscf:uar_timeouts"
          - "ims_icscf:uar_replies_received"
          - "cdp:timeout"
          - "cdp:average_response_time"

      - order: 2
        from: scscf
        to: pyhss
        protocol: Diameter
        interface: Cx
        label: "MAR — Multimedia-Auth-Request"
        description: "S-CSCF requests authentication vectors from HSS to challenge the UE."
        detail: |
          The S-CSCF sends a Multimedia-Auth-Request (MAR) with the user's
          IMPI (Private User Identity) and the requested authentication scheme.
          In this deployment, SIP Digest (MD5) is used instead of IMS-AKA
          because pjsua doesn't support IPsec.

          The HSS returns a MAA with the authentication vectors (realm, nonce,
          expected response). The S-CSCF challenges the UE with a SIP 401
          Unauthorized containing these vectors. The UE computes the digest
          response and sends a new REGISTER.
        failure_modes:
          - "HSS unreachable → ims_auth:mar_timeouts increments"
          - "Auth scheme mismatch (AKA vs Digest) → 401 loop, registration never completes"
          - "Wrong password in HSS → digest verification fails, ims_registrar_scscf:rejected_regs increments"
        metrics_to_watch:
          - "ims_auth:mar_timeouts"
          - "ims_registrar_scscf:rejected_regs"
          - "cdp:average_response_time"

      - order: 3
        from: scscf
        to: pyhss
        protocol: Diameter
        interface: Cx
        label: "SAR — Server-Assignment-Request"
        description: "S-CSCF registers itself as the serving CSCF for this user in the HSS."
        detail: |
          After the UE passes authentication, the S-CSCF sends a
          Server-Assignment-Request (SAR) with assignment type REGISTRATION.
          The HSS:
          1. Stores this S-CSCF as the serving node for this user
          2. Downloads the user's service profile (Initial Filter Criteria)
          3. Returns the SAA with the complete iFC set

          The iFC tells the S-CSCF how to process the user's future SIP
          messages (e.g., which application servers to invoke for INVITE).
        failure_modes:
          - "HSS unreachable → SAR timeout, registration fails at final step"
          - "Missing service profile → S-CSCF has no iFC, calls may not route correctly"
        metrics_to_watch:
          - "ims_registrar_scscf:accepted_regs"
          - "cdp:average_response_time"

      - order: 4
        from: scscf
        to: icscf
        protocol: SIP
        interface: Mw
        label: "200 OK — Authentication complete"
        description: "S-CSCF sends 200 OK back to I-CSCF, confirming successful registration."
        detail: |
          With the SAR complete, the S-CSCF generates the SIP 200 OK
          for the REGISTER. The response includes the registered contact,
          the expiry time, and any associated URIs. The 200 OK propagates
          back: S-CSCF → I-CSCF → P-CSCF → UE.

          At this point:
          - ims_usrloc_scscf:active_contacts increments
          - ims_registrar_scscf:accepted_regs increments
          - cdp:replies_received increments (3 Diameter round-trips total)
        metrics_to_watch:
          - "ims_usrloc_scscf:active_contacts"
          - "ims_registrar_scscf:accepted_regs"
          - "cdp:replies_received"

    outcome:
      success: "User authenticated and registered in IMS. S-CSCF has service profile, HSS has serving assignment."
      observable_metrics:
        - "ims_usrloc_scscf:active_contacts increases by 1"
        - "ims_registrar_scscf:accepted_regs increases by 1"
        - "cdp:replies_received increases by 3 on first registration (UAA + MAA + SAA). On re-registrations the I-CSCF skips UAR if it has a cached S-CSCF list, so only MAA + SAA (2 round-trips) fire."
